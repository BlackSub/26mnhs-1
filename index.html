<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerNavigator - 맞춤형 진로 탐구 주제</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #005088;
            --secondary: #2563eb;
            --bg-color: #f1f5f9;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; }

        .hero { background: linear-gradient(135deg, #020617 0%, #0f172a 50%, var(--primary) 100%); color: white; padding: 60px 20px; text-align: center; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 15px; font-weight: 800; }
        .hero p { font-size: 1.1rem; color: #dbeafe; max-width: 700px; margin: 0 auto; word-break: keep-all;}

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* 가로 스크롤 필터 영역 (17개 계열 대응) */
        .filter-wrapper { position: relative; margin-bottom: 40px; }
        .filter-section { 
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; 
            -ms-overflow-style: none; scrollbar-width: none; white-space: nowrap; 
        }
        .filter-section::-webkit-scrollbar { display: none; }
        .filter-btn {
            background: white; border: 1px solid #cbd5e1; color: var(--text-main);
            padding: 8px 20px; border-radius: 99px; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease; flex-shrink: 0;
        }
        .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 10px rgba(0, 80, 136, 0.2); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

        .card {
            background: white; border-radius: 16px; padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex; flex-direction: column; cursor: pointer;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 20px rgba(0, 80, 136, 0.15); border-color: var(--secondary); }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .category-tag { background: #e0f2fe; color: #0369a1; padding: 4px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 700; }
        .diff-tag { font-size: 0.85rem; font-weight: 600; color: var(--text-sub); background: #f1f5f9; padding: 4px 10px; border-radius: 8px; }
        
        .card h3 { font-size: 1.25rem; margin-bottom: 10px; line-height: 1.4; color: var(--primary); word-break: keep-all; }
        .card p.desc { font-size: 0.95rem; color: var(--text-sub); margin-bottom: 20px; flex-grow: 1; }
        .sdg-info { font-size: 0.85rem; font-weight: 600; color: #059669; margin-bottom: 15px; }
        
        .output-tags { display: flex; flex-wrap: wrap; gap: 8px; border-top: 1px dashed #cbd5e1; padding-top: 15px; margin-bottom: 15px; }
        .output-tag { background: #f8fafc; border: 1px solid #e2e8f0; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; color: var(--text-sub); }
        
        .click-guide { text-align: right; font-size: 0.85rem; font-weight: 700; color: var(--secondary); }

        /* 모달 스타일 */
        .modal-overlay {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px); align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: white; border-radius: 20px; padding: 40px;
            width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto;
            position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }
        .close-btn { position: absolute; top: 25px; right: 30px; font-size: 28px; color: #94a3b8; cursor: pointer; transition: 0.2s; }
        .close-btn:hover { color: #0f172a; }
        
        .modal-body h2 { color: var(--primary); margin-bottom: 15px; font-size: 1.6rem; line-height: 1.3; word-break: keep-all;}
        .detail-section { margin-top: 25px; background: #f8fafc; padding: 20px; border-radius: 12px; border-left: 4px solid var(--primary); }
        .detail-section h4 { color: var(--primary); margin-bottom: 10px; font-size: 1.1rem; }
        .detail-section p, .detail-section ul { font-size: 0.95rem; color: var(--text-main); margin-bottom: 8px; line-height: 1.6; }
        .detail-section ul { padding-left: 20px; }
        .detail-section li { margin-bottom: 6px; }

        @media (max-width: 768px) {
            .modal-content { padding: 25px; width: 95%; }
            .hero { padding: 40px 15px; }
            .hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>학생주도활동주간 SDGs기반 진로연계 탐구활동 주제 예시</h1>
        <p>계열별 맞춤형 SDGs 탐구 프로젝트. 카드를 클릭하면 구체적인 탐구 과정 등 상세 가이드를 볼 수 있습니다.</p>
    </header>

    <main class="container">
        <div class="filter-wrapper">
            <div class="filter-section" id="filter-buttons">
                <button class="filter-btn active" data-filter="all">전체 보기</button>
                <button class="filter-btn" data-filter="경영">경영</button>
                <button class="filter-btn" data-filter="경제">경제</button>
                <button class="filter-btn" data-filter="무역/통상">무역/통상</button>
                <button class="filter-btn" data-filter="IT/컴공">IT/컴공</button>
                <button class="filter-btn" data-filter="건축/도시">건축/도시</button>
                <button class="filter-btn" data-filter="의학/생명">의학/생명</button>
                <button class="filter-btn" data-filter="간호/보건">간호/보건</button>
                <button class="filter-btn" data-filter="정치/행정">정치/행정</button>
                <button class="filter-btn" data-filter="언론/미디어">언론/미디어</button>
                <button class="filter-btn" data-filter="사회/복지">사회/복지</button>
                <button class="filter-btn" data-filter="디자인/미술">디자인/미술</button>
                <button class="filter-btn" data-filter="체육/스포츠">체육/스포츠</button>
                <button class="filter-btn" data-filter="인문/어문">인문/어문</button>
                <button class="filter-btn" data-filter="교육">교육</button>
                <button class="filter-btn" data-filter="기초과학">기초자연과학</button>
                <button class="filter-btn" data-filter="환경/농생명">환경/농생명</button>
                <button class="filter-btn" data-filter="영상/예술">공연/영상/음악</button>
            </div>
        </div>

        <div class="grid" id="card-grid"></div>
    </main>

    <div id="detailModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></span>
            <div id="modal-body-content" class="modal-body"></div>
        </div>
    </div>

    <script>
       // 17개 계열, 총 85개 전체 탐구 주제 마스터 데이터베이스
        const topicData = [
            // --- 1. 경영 ---
            { id: 1, category: "경영", title: "교내 자원 순환을 위한 제로웨이스트 내부 마케팅 프로세스 설계", purpose: "기업이 임직원의 행동 변화를 이끌어내는 '내부 마케팅'과 '린(Lean) 운영'을 학교에 적용해 분리배출 시스템을 기획한다.", process: ["[1일차] 내부 마케팅 및 자원 순환 성공 사례 조사", "[2일차] 쓰레기통 배출 상태 모니터링 및 방해 요인 설문", "[3일차] 참여 유도 인센티브 구조 및 직관적 시각 가이드 기획", "[4일차] 효율화 제안서 작성 및 마케팅 시각물 제작"], sdg: "목표 12. 지속가능한 소비와 생산", method: "모니터링, 설문조사, 프로세스 설계", materials: "구글폼, 체크리스트, 디자인 툴", outputs: ["프로세스 제안서", "마케팅 포스터"], difficulty: "중" },
            { id: 2, category: "경영", title: "급식실 대기 시간 단축을 위한 '서비스 운영 관리' 개선 제안", purpose: "서비스 운영 관리(대기행렬이론)를 활용해 급식 대기 불편을 해소하고 공간 효율성을 극대화한다.", process: ["[1일차] 대기행렬이론 조사 및 급식실 평면도 준비", "[2일차] 배식구 인원 유입 속도, 소요 시간 초단위 측정", "[3일차] 병목 구간 파악 및 동선 재설계 아이디어 회의", "[4일차] 동선 시뮬레이션 모델링 및 제안서 작성"], sdg: "목표 9. 산업, 혁신 및 인프라", method: "현장 관찰, 동선 디자인, 논리적 문제 해결", materials: "초시계, 급식실 도면", outputs: ["동선 비교 도면", "배식 효율화 제안서"], difficulty: "중상" },
            { id: 3, category: "경영", title: "교내 청소 참여 촉진을 위한 '게이미피케이션' 시스템 설계", purpose: "동기부여 이론을 바탕으로 자발적인 궂은일 참여를 유도하는 보상/게임화 시스템을 기획한다.", process: ["[1일차] 동기부여 이론 및 게이미피케이션 사례 조사", "[2일차] 학생 선호 보상 및 기피 업무 설문", "[3일차] 학급 화폐 제도 및 레벨업 시스템 규칙 설계", "[4일차] 룰북 작성 및 앱/게시판 프로토타입 디자인"], sdg: "목표 16. 평화, 정의 및 강력한 제도", method: "인터뷰, 규칙 기획, UI/UX 디자인", materials: "노트북, 포스트잇", outputs: ["학급 퀘스트 앱 UI", "보상 체계 룰북"], difficulty: "중" },
            { id: 4, category: "경영", title: "교내 에너지 절감을 위한 '그린 오피스' 캠페인 마케팅", purpose: "교직원실/교실 대기전력 낭비를 분석하고 행동 변화를 유도하는 넛지 마케팅 기획", process: ["[1일차] 그린 오피스 성공 사례 조사", "[2일차] 조명 켜짐 횟수 관찰 및 절전 방해 요인 설문", "[3일차] 행동 변화 넛지 마케팅 아이디어 도출", "[4일차] 절전 유도 스티커 및 포스터 제작"], sdg: "목표 12. 지속가능한 소비와 생산", method: "모니터링, 넛지 마케팅", materials: "관찰 기록지", outputs: ["낭비 실태 분석 리포트", "넛지 스티커"], difficulty: "하" },
            { id: 5, category: "경영", title: "비품 공유를 위한 '사내 인트라넷' 물품 관리 시스템 기획", purpose: "방치되는 학급 비품 데이터를 수집하고 효율적 공유/대여 시스템 설계", process: ["[1일차] 기업 재고 관리(ERP) 시스템 조사", "[2일차] 반별 비품 개수 실사 및 분실률 데이터 수집", "[3일차] 바코드 대여 등 공유 시스템 룰 설계", "[4일차] '비품 관리 앱' UI 기획안 작성"], sdg: "목표 12. 지속가능한 소비와 생산", method: "재고 실사, 시스템 설계", materials: "바인더, 재고조사표", outputs: ["재고 데이터 보드", "비품 관리 앱 기획서"], difficulty: "중" },

            // --- 2. 경제 ---
            { id: 6, category: "경제", title: "행동경제학 활용 교내 에너지 낭비 방지 '넛지(Nudge)' 실험", purpose: "경제적 인센티브가 불가능한 환경에서 행동경제학을 활용해 에너지 절약을 유도하는 방안 탐구.", process: ["[1일차] 행동경제학(손실회피) 개념 조사 및 실험 설계", "[2일차] 정보/손실회피 스티커 부착 후 소등 빈도 측정", "[3일차] 그룹 간 행동 변화 데이터 비교 분석", "[4일차] 보고서 작성 및 캠페인 확대 제안"], sdg: "목표 7. 깨끗한 에너지", method: "통제 실험, 행동 관찰, 통계 분석", materials: "스티커, 기록지", outputs: ["효과성 분석 소논문", "최종 디자인 도안"], difficulty: "중상" },
            { id: 7, category: "경제", title: "용돈 소비 패턴 변화를 통한 '청소년 체감 물가 지수' 산출", purpose: "물가 상승이 학생들의 예산 내 어떤 대체 소비를 유발하는지 실증 파악.", process: ["[1일차] CPI 산출 방식 학습 및 품목 선정", "[2일차] 주변 상가 가격 수집 및 소비 변화 설문", "[3일차] 엑셀로 '청소년 물가 지수' 계산 및 분석", "[4일차] 데이터 시각화 및 경제 뉴스 작성"], sdg: "목표 8. 좋은 일자리와 경제성장", method: "가격 수집, 설문, 통계 분석", materials: "스프레드시트", outputs: ["체감 물가 인포그래픽", "경제 뉴스 기사"], difficulty: "상" },
            { id: 8, category: "경제", title: "교내 유휴 자원의 '공유경제' 플랫폼 효용성 분석", purpose: "소유를 넘어 자원 사용을 극대화하는 공유경제 원리를 교내 적용하여 가치 증명.", process: ["[1일차] 공유경제 모델 조사", "[2일차] 안 쓰는 문제집 등 수량 파악 및 기회비용 계산", "[3일차] 교내 대여 시스템 설계 및 절감액 도출", "[4일차] 플랫폼 기획서 및 서비스 화면 디자인"], sdg: "목표 12. 지속가능한 소비와 생산", method: "자원 조사, 비용 분석, 서비스 기획", materials: "구글 폼, 계산기", outputs: ["자원 절약 추산 보고서", "플랫폼 UI 기획서"], difficulty: "중" },
            { id: 9, category: "경제", title: "학생들의 '시간 빈곤(Time Poverty)' 실태 및 기회비용 분석", purpose: "수면/휴식 시간이 뺏기는 현상을 기회비용으로 수치화해 삶의 질 분석.", process: ["[1일차] 기회비용 원리 및 시간 빈곤 조사", "[2일차] 24시간 타임테이블 설문", "[3일차] 휴식 부족 스트레스 인과관계 분석 및 화폐 단위 환산", "[4일차] 휴식 보장 권고안 작성"], sdg: "목표 3. 건강한 삶", method: "타임로그 수집, 가치 환산", materials: "구글 폼, 엑셀", outputs: ["시간 빈곤 지수 리포트", "정책 건의문"], difficulty: "중상" },

            grid.innerHTML = ''; 
            const filteredData = filter === 'all' ? topicData : topicData.filter(item => item.category === filter);
            
            filteredData.forEach(item => {
                const outputsHtml = item.outputs.map(out => `<span class="output-tag"><i class="fa-solid fa-check"></i> ${out}</span>`).join('');
                const cardHTML = `
                    <div class="card" onclick="openModal(${item.id})">
                        <div class="card-header">
                            <span class="category-tag">${item.category}</span>
                            <span class="diff-tag">난이도: ${item.difficulty}</span>
                        </div>
                        <h3>${item.title}</h3>
                        <p class="desc">${item.purpose.substring(0, 60)}...</p>
                        <div class="sdg-info"><i class="fa-solid fa-leaf"></i> ${item.sdg.split(',')[0]}</div>
                        <div class="output-tags">${outputsHtml}</div>
                        <div class="click-guide">상세 보기 <i class="fa-solid fa-arrow-right"></i></div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        function openModal(id) {
            const data = topicData.find(item => item.id === id);
            if(!data) return;

            const processList = data.process.map(step => `<li>${step}</li>`).join('');
            const outputsHtml = data.outputs.map(out => `<span class="output-tag">${out}</span>`).join('');

            modalContent.innerHTML = `
                <div class="card-header" style="margin-bottom: 10px;">
                    <span class="category-tag">${data.category}</span>
                    <span class="diff-tag">난이도: ${data.difficulty}</span>
                </div>
                <h2>${data.title}</h2>
                <div class="sdg-info" style="font-size: 1rem;"><i class="fa-solid fa-leaf"></i> 관련 SDGs: ${data.sdg}</div>
                
                <div class="detail-section">
                    <h4>🎯 탐구 목적</h4>
                    <p>${data.purpose}</p>
                </div>

                <div class="detail-section">
                    <h4>📅 개략적 탐구과정 (4일 기준)</h4>
                    <ul style="list-style-type: none; padding-left: 0;">${processList}</ul>
                </div>

                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
                    <div class="detail-section">
                        <h4>🏃 활동 방식</h4>
                        <p>${data.method}</p>
                    </div>
                    <div class="detail-section">
                        <h4>🎒 필요 물품</h4>
                        <p>${data.materials}</p>
                    </div>
                </div>

                <div class="detail-section" style="border-left-color: #059669; background: #ecfdf5;">
                    <h4 style="color: #059669;">✨ 예상 산출물</h4>
                    <div class="output-tags" style="border: none; padding-top: 0; margin-bottom: 0;">
                        ${outputsHtml}
                    </div>
                </div>
            `;
            modal.style.display = "flex";
        }

        function closeModal() { modal.style.display = "none"; }
        window.onclick = function(event) { if (event.target == modal) closeModal(); }

        // 필터링 버튼 클릭 이벤트 + 스크롤 시각 효과 적용
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelector('.filter-btn.active').classList.remove('active');
                e.target.classList.add('active');
                renderCards(e.target.getAttribute('data-filter'));
                
                // 클릭한 버튼이 잘 보이도록 스크롤 이동
                e.target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            });
        });

        // 마우스 드래그 가로 스크롤 (PC 사용자를 위한 UX 개선)
        const slider = document.querySelector('.filter-section');
        let isDown = false;
        let startX;
        let scrollLeft;

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });
        slider.addEventListener('mouseleave', () => { isDown = false; });
        slider.addEventListener('mouseup', () => { isDown = false; });
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 2; // 스크롤 속도
            slider.scrollLeft = scrollLeft - walk;
        });

        renderCards('all');
    </script>
</body>
</html>
